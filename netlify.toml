[dev]
  command = "npm run dev:vite"
  port = 8888
  targetPort = 5173
  framework = "vite"
  autoLaunch = false

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_KEYS = "ADMIN_USERNAME, GOOGLE_SITE_URL, VITE_CLOUDINARY_CLOUD_NAME, CLOUDINARY_CLOUD_NAME"
  VITE_VAPID_PUBLIC_KEY = "BEKjygiNAzdd734YUZfsLmXFsmAM5gn2hkZCz6Zp2iQjBBF2YOZBHaQRoGydDl4LdK-DlDGPlEBrOghemi_o3-g"
  VITE_CLOUDINARY_CLOUD_NAME = "dfuzfdrat"
  GOOGLE_SITE_URL = "https://hotelpuntagaleria.mx"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."export-pdf"]
  node_bundler = "nft"
  timeout = 26

[functions."push-notify"]
  node_bundler = "nft"

[functions."push-subscribe"]
  node_bundler = "nft"

# CORS para Netlify Functions — necesario cuando el APK nativo usa origen https://localhost
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively (hashed filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# assetlinks.json para Android App Links — debe ser JSON, nunca HTML
[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "no-cache"

# version.json — nunca cachear, para que el OTA detecte cada deploy al instante
[[headers]]
  for = "/version.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "no-cache, no-store, must-revalidate"
